<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capsules — An Atlas of 151 Colors</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#e8513a; --scan:1;
  --bg:#09090e; --bg2:#0e0e16; --panel:#14141e; --panel2:#1a1a26;
  --ink:#f1eee4; --dim:#83838f; --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.16);
  --ball-white:#f2f2f4; --ball-dark:#141418;
}
html[data-theme="light"]{
  --bg:#e9e7dd; --bg2:#f3f1e9; --panel:#ffffff; --panel2:#f7f5ee;
  --ink:#17171f; --dim:#6c6c76; --line:rgba(0,0,0,.10); --line2:rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink)}
body{
  font-family:"Space Grotesk",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1200px 600px at 50% -10%, var(--bg2), transparent 70%),
    var(--bg);
  min-height:100vh;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:60;
  opacity:calc(var(--scan)*.5);
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}
html[data-theme="light"] body::after{mix-blend-mode:normal;opacity:calc(var(--scan)*.22)}
.px{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
.dim{color:var(--dim)}
.page{max-width:1320px;margin:0 auto;padding:0 28px 80px}

/* masthead */
.masthead{
  display:flex;justify-content:space-between;align-items:flex-end;gap:32px;
  padding:40px 0 26px;border-bottom:1px solid var(--line);flex-wrap:wrap;
}
.wordmark{
  font-family:"Press Start 2P",monospace;font-size:clamp(20px,3.4vw,40px);
  line-height:1;letter-spacing:1px;
  background:linear-gradient(180deg,var(--ink),color-mix(in srgb,var(--ink) 55%, var(--accent)));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.wordmark.sm{font-size:14px}
.tagline{margin-top:14px;max-width:560px;color:var(--dim);font-size:15px;line-height:1.5}
.tagline em{color:var(--ink);font-style:normal;font-weight:600;box-shadow:inset 0 -1px 0 var(--accent)}
.stats{display:flex;gap:26px}
.stat{display:flex;flex-direction:column;align-items:flex-end;line-height:1}
.stat b{font-family:"Space Mono",monospace;font-size:26px;font-weight:700}
.stat.wide b{font-size:15px;letter-spacing:.01em}
.stat span{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:6px}

/* hero */
.hero{
  position:relative;display:flex;flex-direction:column;align-items:center;
  padding:74px 0 64px;overflow:hidden;
}
.hero-glow{
  position:absolute;width:760px;height:760px;border-radius:50%;
  filter:blur(34px);opacity:.55;transition:background .5s linear;z-index:0;
  top:50%;left:50%;transform:translate(-50%,-46%);
}
.hero-stage{position:relative;z-index:1;display:flex;align-items:center;justify-content:center}
.hero-sprite{filter:drop-shadow(0 18px 26px rgba(0,0,0,.45))}
@keyframes fadein{from{opacity:.0}to{opacity:1}}
.fadein{animation:fadein .55s ease both}
.strip-window{position:relative;overflow:hidden;display:flex;align-items:center;
  -webkit-mask:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
          mask:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
.strip-track{display:flex;align-items:center;gap:14px;animation:marquee 26s linear infinite}
.strip-track img{filter:drop-shadow(0 10px 14px rgba(0,0,0,.4))}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.readout{margin-top:34px;text-align:center;z-index:1}
.ro-num{font-family:"Space Mono",monospace;color:var(--dim);font-size:13px;letter-spacing:.28em}
.ro-name{font-size:30px;font-weight:700;margin-top:4px;letter-spacing:-.01em}
.ro-hex{font-family:"Space Mono",monospace;font-size:14px;margin-top:10px;color:var(--dim);
  display:inline-flex;align-items:center;gap:9px}
.chip{width:14px;height:14px;border-radius:3px;box-shadow:0 0 0 1px var(--line2)}

/* css ball (morph) */
.cssball{position:relative;border-radius:50%;overflow:hidden;
  box-shadow:inset 0 0 0 3px rgba(0,0,0,.22), 0 22px 30px -12px rgba(0,0,0,.6)}
.cb-top{position:absolute;top:0;left:0;right:0;transition:background .5s linear}
.cb-bot{position:absolute;bottom:0;left:0;right:0;background:var(--ball-white)}
.cb-band{position:absolute;left:0;right:0;background:var(--ball-dark)}
.cb-btn{position:absolute;border-radius:50%;background:var(--ball-white);
  border-style:solid;border-color:var(--ball-dark);
  box-shadow:0 0 0 2px var(--ball-white), inset 0 1px 2px rgba(0,0,0,.25)}

/* band labels */
.band-label{display:flex;justify-content:space-between;align-items:baseline;gap:18px;
  margin:46px 0 16px;padding-bottom:10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.band-label>span:first-child{font-family:"Space Mono",monospace;font-weight:700;
  letter-spacing:.26em;font-size:13px}
.band-label .dim{font-size:12px;letter-spacing:.04em}

/* spectrum */
.spectrum{display:flex;width:100%;height:76px;border-radius:10px;overflow:hidden;
  border:1px solid var(--line);box-shadow:0 10px 30px -16px rgba(0,0,0,.6)}
.spec-stripe{flex:1 1 0;border:0;padding:0;cursor:pointer;
  transition:flex-grow .28s cubic-bezier(.2,.7,.2,1);position:relative}
.spec-stripe:hover{flex-grow:5;z-index:2;box-shadow:0 0 0 1px var(--line2)}

/* atlas */
.atlas{display:grid;gap:12px;margin-top:4px}
.tile{appearance:none;border:1px solid var(--line);background:var(--panel);
  border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  gap:8px;padding:14px 10px 12px;cursor:pointer;color:var(--ink);position:relative;
  transition:transform .18s ease, border-color .18s ease, box-shadow .25s ease, background .25s ease}
.tile-chain{position:absolute;top:8px;right:9px;font-size:11px;line-height:1;color:var(--accent);
  opacity:.8}
.tile:hover{transform:translateY(-5px);border-color:var(--c);
  background:color-mix(in srgb, var(--c) 9%, var(--panel));
  box-shadow:0 16px 34px -14px var(--c)}
.tile-art{flex:1;display:flex;align-items:center;justify-content:center}
.tile-art img{filter:drop-shadow(0 6px 8px rgba(0,0,0,.35))}
.tile-meta{display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center}
.t-num{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.12em;color:var(--dim)}
.t-name{font-size:13px;font-weight:600;line-height:1.1}
.t-hex{font-family:"Space Mono",monospace;font-size:10.5px;margin-top:1px}
.tile-missing{justify-content:center;gap:10px;border-style:dashed;cursor:default;
  background:
    repeating-linear-gradient(45deg, transparent 0 7px, color-mix(in srgb,var(--accent) 10%, transparent) 7px 8px),
    var(--panel)}
.miss-mark{font-family:"Press Start 2P",monospace;font-size:10px;line-height:1.5;
  text-align:center;color:var(--accent);opacity:.85}

/* lightbox */
.lb{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
  padding:24px;background:rgba(5,5,9,.8);backdrop-filter:blur(8px);animation:fadein .2s ease both}
.lb-card{position:relative;width:min(720px,94vw);background:var(--panel);
  border:1px solid var(--line2);border-radius:20px;padding:30px;
  box-shadow:0 40px 90px -30px rgba(0,0,0,.8)}
.lb-body{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:center}
.lb-art{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:var(--panel2)}
.lb-art img{width:64%;height:64%;image-rendering:pixelated}
.lb-num{font-family:"Space Mono",monospace;color:var(--dim);font-size:13px;letter-spacing:.2em}
.lb-name{font-size:34px;font-weight:700;margin:4px 0 18px;letter-spacing:-.015em}
.lb-swatch-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.lb-swatch{width:46px;height:46px;border-radius:10px;box-shadow:0 0 0 1px var(--line2)}
.lb-hex{font-family:"Space Mono",monospace;font-size:16px;font-weight:700}
.lb-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-top:3px}
.lb-insc{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:9px 12px;
  border:1px solid var(--line);border-radius:9px;background:var(--panel2)}
.lb-insc-k{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.18em;color:var(--dim)}
.lb-insc-v{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;letter-spacing:.02em}
.lb-blurb{color:var(--dim);font-size:14px;line-height:1.55;max-width:34ch}
.lb-chain{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:11px 16px;
  border-radius:10px;background:var(--accent);color:#fff;font-family:"Space Mono",monospace;
  font-size:13px;font-weight:700;text-decoration:none;letter-spacing:.03em;
  transition:transform .15s, filter .15s}
.lb-chain:hover{transform:translateY(-2px);filter:brightness(1.08)}
.lb-chain.pending{background:var(--panel2);color:var(--dim);border:1px dashed var(--line2);cursor:default}
.lb-chain.pending:hover{transform:none;filter:none}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;
  border-radius:50%;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s, transform .15s}
.lb-arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.lb-arrow.left{left:-14px}.lb-arrow.right{right:-14px}
.lb-close{position:absolute;top:14px;right:16px;background:none;border:0;color:var(--dim);
  font-size:16px;cursor:pointer;line-height:1}
.lb-close:hover{color:var(--ink)}

/* footer */
.foot{display:flex;align-items:center;gap:16px;margin-top:60px;padding-top:24px;
  border-top:1px solid var(--line);flex-wrap:wrap}
.foot .dim{font-size:13px}

@media(max-width:640px){
  .masthead{align-items:flex-start}
  .stats{gap:18px}.stat b{font-size:20px}
  .lb-body{grid-template-columns:1fr}.lb-art{max-width:60%;margin:0 auto}
  .lb-arrow.left{left:6px}.lb-arrow.right{right:6px}
}
</style>

<script>
// Dome-color extraction. The art is a Pokeball whose TOP DOME is recolored per
// creature; the lower half / band / button are structural white/black/grey.
// We sample the top ~46% of the sprite, skip transparent + near-black outline
// pixels, and average the rest. This returns the true dome color even for
// pale/grey creatures (where a saturation filter would fail).
window.extractDomeColor = function (img) {
  const w = img.naturalWidth || 32, h = img.naturalHeight || 32;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, w, h);
  let data;
  try { data = ctx.getImageData(0, 0, w, h).data; }
  catch (e) { return '#888888'; }

  const domeRows = Math.round(h * 0.46);
  let r = 0, g = 0, b = 0, n = 0;
  for (let y = 0; y < domeRows; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const a = data[i + 3];
      if (a < 200) continue;                 // transparent corner
      const R = data[i], G = data[i + 1], B = data[i + 2];
      const lum = (R + G + B) / 3;
      if (lum < 28) continue;                // dark outline
      r += R; g += G; b += B; n++;
    }
  }
  if (n === 0) return '#888888';
  return rgbToHex(Math.round(r / n), Math.round(g / n), Math.round(b / n));
};

function rgbToHex(r, g, b) {
  const h = (v) => v.toString(16).padStart(2, '0');
  return '#' + h(r) + h(g) + h(b);
}
window.rgbToHex = rgbToHex;

// Perceptual hue for sorting the spectrum (HSL hue + a luma tiebreak).
window.colorSortKey = function (hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  let h = 0, s = 0;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h /= 6;
  }
  // push near-greys to the end, ordered by lightness
  if (s < 0.12) return 1000 + l;
  return h * 360 + (1 - s) * 0.0001;
};

// Readable text color on a given background.
window.contrastInk = function (hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const yiq = (r * 299 + g * 587 + b * 114) / 1000;
  return yiq >= 150 ? '#10101a' : '#f5f3ec';
};
</script>

  return e && e.id ? "https://ordinals.com/inscription/" + e.id : null;
};
// raw byte-perfect on-chain image content (used for specimens not in the local export)
window.inscriptionContent = function (n) {
  const e = window.INSCRIPTIONS[n];
  return e && e.id ? "https://ordinals.com/content/" + e.id : null;
};
window.shortId = function (n) {
  const e = window.INSCRIPTIONS[n];
  if (!e || !e.id) return "";
  return e.id.slice(0, 6) + "…" + e.id.slice(-6);
};
</script>

<!-- The app (JSX, transpiled in-browser by Babel) -->
<script type="text/babel">
/* global React, ReactDOM, extractDomeColor, colorSortKey, contrastInk, COLLECTION */
const { useState, useEffect, useMemo, useRef } = React;

const ALL = Array.from({ length: 151 }, (_, i) => i + 1);
const AVAIL = ALL;                          // all 151 are inscribed on-chain
const NO_LOCAL = new Set([]);               // all sprites available locally in images/
const pad = (n) => String(n).padStart(3, '0');
const artSrc = (n) =>
  (window.SPRITES && window.SPRITES[n])
    ? window.SPRITES[n]
    : (NO_LOCAL.has(n) ? window.inscriptionContent(n) : `images/${n}.png`);

// Settings baked in from the configuration chosen in the editor. This is a
// static build: there is no Tweaks panel and these values cannot be changed
// at runtime.
const SETTINGS = {
  theme: "dark",
  flipbook: "flicker",
  tempo: 1,
  order: "dex",
  labels: "name",
  tile: 132,
  heroScale: 440,
  accent: "#f5b13d",
  glow: true,
  scan: true,
};

/* colors come straight from the inscription sheet — authoritative + instant */

/* --------------------------------------------------------------- CSS ball */
function CssBall({ color, size }) {
  const band = Math.max(3, size * 0.11);
  const btn = size * 0.26;
  const ring = Math.max(3, size * 0.035);
  return (
    <div className="cssball" style={{ width: size, height: size }}>
      <div className="cb-top" style={{ background: color, height: size / 2 }} />
      <div className="cb-bot" style={{ height: size / 2 }} />
      <div className="cb-band" style={{ height: band, top: size / 2 - band / 2 }} />
      <div className="cb-btn" style={{
        width: btn, height: btn, left: size / 2 - btn / 2, top: size / 2 - btn / 2,
        borderWidth: ring
      }} />
    </div>
  );
}

/* ------------------------------------------------------------------- hero */
function FlipbookHero({ t, colors, ready }) {
  const seq = useMemo(() => {
    if (t.order === 'spectrum' && ready) {
      return [...AVAIL].sort((a, b) => colorSortKey(colors[a]) - colorSortKey(colors[b]));
    }
    return AVAIL;
  }, [t.order, ready, colors]);

  const [cur, setCur] = useState(0);
  useEffect(() => { setCur(0); }, [t.flipbook, t.order]);

  useEffect(() => {
    if (t.flipbook === 'filmstrip' || !seq.length) return;
    const base = t.flipbook === 'flicker' ? 70 : t.flipbook === 'fade' ? 620 : 520;
    const ms = Math.max(28, base * (5 / t.tempo));
    const id = setInterval(() => setCur((c) => (c + 1) % seq.length), ms);
    return () => clearInterval(id);
  }, [t.flipbook, t.tempo, seq]);

  const num = seq[cur] || AVAIL[0];
  const color = colors[num] || '#8a8a99';
  const S = t.heroScale;

  return (
    <section className="hero">
      <div
        className="hero-glow"
        style={{
          background: t.glow ? `radial-gradient(closest-side, ${color}cc, ${color}00 72%)` : 'transparent',
          transition: t.flipbook === 'morph' ? 'background .5s linear'
            : t.flipbook === 'fade' ? 'background .45s ease' : 'none'
        }}
      />
      <div className="hero-stage" style={{ width: S, height: S }}>
        {t.flipbook === 'morph' && <CssBall color={color} size={S} />}
        {(t.flipbook === 'flicker') && (
          <img className="px hero-sprite" src={artSrc(num)} alt="" style={{ width: S, height: S }} />
        )}
        {(t.flipbook === 'fade') && (
          <img key={num} className="px hero-sprite fadein" src={artSrc(num)} alt="" style={{ width: S, height: S }} />
        )}
        {t.flipbook === 'filmstrip' && (
          <div className="strip-window" style={{ width: S * 1.15, height: S }}>
            <div className="strip-track">
              {[...seq, ...seq].map((n, i) => (
                <img key={i} className="px" src={artSrc(n)} alt="" style={{ width: S * 0.62, height: S * 0.62 }} />
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="readout">
        {t.flipbook === 'filmstrip' ? (
          <React.Fragment>
            <div className="ro-num">ALL · 151</div>
            <div className="ro-name">continuous reel</div>
            <div className="ro-hex" style={{ color: t.accent }}>151 Inscriptions looping</div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="ro-num">SPECIMEN</div>
            <div className="ro-name">№ {pad(num)}</div>
            <div className="ro-hex">
              <span className="chip" style={{ background: color }} />
              {(color || '').toUpperCase()}
            </div>
          </React.Fragment>
        )}
      </div>
    </section>
  );
}

/* --------------------------------------------------------------- spectrum */
function Spectrum({ colors, ready, onPick }) {
  const ordered = useMemo(() => {
    if (!ready) return AVAIL;
    return [...AVAIL].sort((a, b) => colorSortKey(colors[a]) - colorSortKey(colors[b]));
  }, [ready, colors]);
  return (
    <div className="spectrum" role="list" aria-label="All 151 colors, sorted by hue">
      {ordered.map((n) => (
        <button
          key={n}
          className="spec-stripe"
          style={{ background: colors[n] || '#222' }}
          title={`№${pad(n)}  ${(colors[n] || '').toUpperCase()}`}
          onClick={() => onPick(n)}
        />
      ))}
    </div>
  );
}

/* ------------------------------------------------------------------ atlas */
function Tile({ n, t, colors, onOpen }) {
  const color = colors[n] || '#3a3a44';
  const onChain = NO_LOCAL.has(n);
  return (
    <button
      className="tile"
      style={{ minHeight: t.tile, '--c': color, boxShadow: t.glow ? undefined : 'none' }}
      onClick={() => onOpen(n)}
      title={onChain ? 'served byte-perfect from Bitcoin' : undefined}
    >
      {onChain && <span className="tile-chain" title="rendered from the on-chain inscription">⛓</span>}
      <div className="tile-art">
        <img className="px" src={artSrc(n)} alt={`№ ${pad(n)}`} style={{ width: t.tile * 0.52, height: t.tile * 0.52 }} />
      </div>
      {t.labels !== 'none' && (
        <div className="tile-meta">
          <span className="t-name">№ {pad(n)}</span>
          {t.labels === 'full' && <span className="t-hex" style={{ color }}>{color.toUpperCase()}</span>}
        </div>
      )}
    </button>
  );
}

function Atlas({ t, colors, ready, onOpen }) {
  const seq = useMemo(() => {
    if (t.order === 'spectrum') {
      return [...ALL].sort((a, b) => colorSortKey(colors[a]) - colorSortKey(colors[b]));
    }
    return ALL;
  }, [t.order, colors]);
  return (
    <div className="atlas" style={{ gridTemplateColumns: `repeat(auto-fill, minmax(${t.tile}px, 1fr))` }}>
      {seq.map((n) => <Tile key={n} n={n} t={t} colors={colors} onOpen={onOpen} />)}
    </div>
  );
}

/* --------------------------------------------------------------- lightbox */
function Lightbox({ n, colors, onClose, onNav }) {
  useEffect(() => {
    const k = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') onNav(1);
      if (e.key === 'ArrowLeft') onNav(-1);
    };
    window.addEventListener('keydown', k);
    return () => window.removeEventListener('keydown', k);
  }, [onClose, onNav]);
  if (!n) return null;
  const color = colors[n] || '#8a8a99';
  const url = window.inscriptionUrl(n);
  return (
    <div className="lb" onClick={onClose}>
      <div className="lb-card" onClick={(e) => e.stopPropagation()}>
        <button className="lb-arrow left" onClick={() => onNav(-1)} aria-label="Previous">‹</button>
        <div className="lb-body">
          <div className="lb-art" style={{ background: `radial-gradient(closest-side, ${color}55, transparent 70%)` }}>
            <img className="px" src={artSrc(n)} alt={`№ ${pad(n)}`} />
          </div>
          <div className="lb-info">
            <div className="lb-num">SPECIMEN</div>
            <div className="lb-name">№ {pad(n)} <span className="dim" style={{ fontWeight: 400, fontSize: '0.55em' }}>/ 151</span></div>
            <div className="lb-swatch-row">
              <span className="lb-swatch" style={{ background: color }} />
              <div>
                <div className="lb-hex">{color.toUpperCase()}</div>
                <div className="lb-sub">official dome color</div>
              </div>
            </div>
            <div className="lb-insc">
              <span className="lb-insc-k">INSCRIPTION</span>
              <span className="lb-insc-v">{window.shortId(n)}</span>
            </div>
            <p className="lb-blurb">
              № {pad(n)} reduced to a single defining hue — inscribed byte-perfect
              onto Bitcoin.
            </p>
            <a className="lb-chain" href={url} target="_blank" rel="noopener noreferrer">
              View inscription on-chain <span aria-hidden="true">↗</span>
            </a>
          </div>
        </div>
        <button className="lb-arrow right" onClick={() => onNav(1)} aria-label="Next">›</button>
        <button className="lb-close" onClick={onClose} aria-label="Close">✕</button>
      </div>
    </div>
  );
}

/* -------------------------------------------------------------------- app */
function App() {
  const t = SETTINGS;
  const colors = window.DOME_COLORS;
  const ready = true;
  const [lb, setLb] = useState(null);

  useEffect(() => {
    document.documentElement.dataset.theme = t.theme;
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--scan', t.scan ? '1' : '0');
  }, [t.theme, t.accent, t.scan]);

  const nav = (dir) => {
    setLb((cur) => {
      if (!cur) return cur;
      let i = AVAIL.indexOf(cur);
      if (i === -1) { // currently on missing; jump near
        const near = AVAIL.filter((x) => x < cur).pop() || AVAIL[0];
        i = AVAIL.indexOf(near);
      }
      const ni = (i + dir + AVAIL.length) % AVAIL.length;
      return AVAIL[ni];
    });
  };

  return (
    <div className="page">
      <header className="masthead">
        <div className="mast-left">
          <div className="wordmark">CAPSULES</div>
          <div className="tagline">An art project representing the original 151 — each creature distilled to a single color,
            then inscribed <em>byte-perfect</em> on Bitcoin. 151 capsules, 151 colors, 151 Inscriptions.</div>
        </div>
        <div className="stats">
          <div className="stat"><b>151</b><span>specimens</span></div>
          <div className="stat"><b>{COLLECTION.uniqueColors}</b><span>unique hues</span></div>
          <div className="stat wide">
            <b>#{COLLECTION.inscrLow.toLocaleString()}–{COLLECTION.inscrHigh.toLocaleString()}</b>
            <span>inscriptions · bitcoin</span>
          </div>
          <div className="stat"><b style={{ color: 'var(--accent)' }}>BTC</b><span>byte-perfect</span></div>
        </div>
      </header>

      <FlipbookHero t={t} colors={colors} ready={ready} />

      <div className="band-label">
        <span>THE SPECTRUM</span>
        <span className="dim">151 dome colors, sorted by hue · click to inspect</span>
      </div>
      <Spectrum colors={colors} ready={ready} onPick={setLb} />

      <div className="band-label">
        <span>THE ATLAS</span>
        <span className="dim">{t.order === 'spectrum' ? 'ordered by color' : 'national dex order'} · click any specimen</span>
      </div>
      <Atlas t={t} colors={colors} ready={ready} onOpen={setLb} />

      <footer className="foot">
        <span className="wordmark sm">CAPSULES</span>
        <span className="dim">A color study of all 151 — inscribed byte-perfect on Bitcoin.</span>
      </footer>

      <Lightbox n={lb} colors={colors} onClose={() => setLb(null)} onNav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
